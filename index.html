<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Parasitologia - Flashcards & Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">🔬 LabVirtual: Parasitologia</h2>
                <p class="text-muted">Estudo Ativo & Repetição Espaçada de Helmintos</p>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-muted small fw-bold" id="progress-text">Carregando progresso...</span>
                <span class="badge bg-secondary" id="score-text">Acertos: 0</span>
            </div>
            <div class="progress mb-4" style="height: 8px;">
                <div id="progress-bar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
            </div>

            <div class="card card-flashcard p-4 bg-white">
                
                <div id="microscope-container" class="microscope-viewport mb-4 d-none">
                    <img id="microscope-screen" src="" alt="Lâmina de Parasitologia" class="microscope-img">
                </div>

                <div class="mb-4">
                    <span class="badge bg-primary mb-2">Enunciado Fecal</span>
                    <h5 id="question-text" class="card-title lh-base text-dark">Carregando pergunta...</h5>
                </div>

                <div id="options-container" class="d-grid gap-2 mb-4"></div>

                <div id="feedback-panel" class="d-none mb-4">
                    <h4 id="feedback-status" class="fw-bold mb-3 text-center"></h4>
                    <div class="justification-box p-3">
                        <h6 class="fw-bold text-primary mb-1">Análise do Professor:</h6>
                        <p id="rationale-text" class="small text-dark mb-0"></p>
                    </div>
                </div>

                <div class="text-end">
                    <button id="btn-action" class="btn btn-primary btn-lg px-4 rounded-pill d-none">Próximo Card →</button>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
